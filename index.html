<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ChuChu Demo Links</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7efe6;
        --text: #12233f;
        --muted: #65738a;
        --line: rgba(18, 35, 63, 0.12);
        --accent: #1477c9;
        --accent-soft: #e9f3ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", "Trebuchet MS", Arial, sans-serif;
        background:
          radial-gradient(circle at top left, rgba(255, 220, 191, 0.85), transparent 28%),
          radial-gradient(circle at top right, rgba(190, 228, 255, 0.9), transparent 24%),
          linear-gradient(180deg, #fffaf5 0%, var(--bg) 100%);
        color: var(--text);
      }

      .panel {
        width: min(720px, calc(100% - 28px));
        padding: 32px 28px;
        border: 1px solid var(--line);
        border-radius: 24px;
        background: rgba(255, 253, 249, 0.92);
        box-shadow: 0 18px 50px rgba(18, 35, 63, 0.12);
      }

      .eyebrow {
        margin: 0 0 10px;
        color: var(--accent);
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 5vw, 3rem);
        line-height: 1.05;
      }

      p {
        margin: 0 0 22px;
        line-height: 1.7;
        color: var(--muted);
      }

      .links {
        display: grid;
        gap: 12px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 18px;
        border-radius: 999px;
        font-weight: 700;
        text-decoration: none;
      }

      .primary {
        background: var(--accent);
        color: white;
      }

      .secondary {
        border: 1px solid rgba(20, 119, 201, 0.16);
        background: var(--accent-soft);
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <p class="eyebrow">Tiny Tamagotchi MVP</p>
      <h1>ChuChu Demo</h1>
      <p>
        This GitHub Pages site only provides clean links, so the recorded playthrough opens
        directly instead of embedding a full preview page.
      </p>
      <div class="links">
        <a class="primary" href="./chuchu-demo.webm">Open Playthrough Demo</a>
        <a class="secondary" href="https://github.com/usermanoj/Tamagotchi-SDD-Codex">View Repository</a>
      </div>
    </main>
  </body>
</html>
