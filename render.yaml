services:
  - type: web
    name: tamagotchi-sdd-codex-api
    env: python
    rootDir: api
    plan: free
    buildCommand: pip install -e .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: CORS_ORIGINS
        value: https://tamagotchi-sdd-codex-web.onrender.com
    disk:
      name: chuchu-data
      mountPath: /opt/render/project/src/api/data
      sizeGB: 1

  - type: web
    name: tamagotchi-sdd-codex-web
    env: node
    rootDir: web
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 22.14.0
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://tamagotchi-sdd-codex-api.onrender.com/api/v1
